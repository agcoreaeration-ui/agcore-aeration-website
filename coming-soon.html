<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AG Core Aeration – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:      #000000;
      --green-mid:  #2d7a2d;
      --green-bright: #4db84d;
      --green-light: #6fd46f;
      --white:      #ffffff;
      --grey:       #aaaaaa;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Animated dot-grid background ── */
    .bg-dots {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-dots span {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--green-mid);
      opacity: 0;
      animation: pulse-dot 4s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: 0.35; transform: scale(1.3); }
    }

    /* ── Main layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 2.8rem;
      animation: fade-up 1s ease both;
    }

    .logo-wrap img {
      width: clamp(180px, 30vw, 280px);
      height: auto;
      filter: drop-shadow(0 0 32px rgba(77, 184, 77, 0.25));
    }

    /* ── Divider line ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green-bright), transparent);
      margin: 0 auto 2.6rem;
      animation: fade-up 1s 0.2s ease both;
    }

    /* ── Heading ── */
    h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1;
      background: linear-gradient(135deg, var(--green-light) 0%, var(--green-bright) 50%, var(--green-mid) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fade-up 1s 0.3s ease both;
      margin-bottom: 1.4rem;
    }

    /* ── Sub-message ── */
    .sub {
      font-size: clamp(0.85rem, 2.2vw, 1.05rem);
      font-weight: 300;
      color: var(--grey);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      animation: fade-up 1s 0.45s ease both;
      margin-bottom: 3rem;
    }

    /* ── Dot-row accent (mirrors logo motif) ── */
    .dot-row {
      display: flex;
      gap: 10px;
      justify-content: center;
      animation: fade-up 1s 0.6s ease both;
    }

    .dot-row span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-bright);
      opacity: 0.5;
      animation: blink 2.4s ease-in-out infinite;
    }

    .dot-row span:nth-child(2) { animation-delay: 0.4s; }
    .dot-row span:nth-child(3) { animation-delay: 0.8s; }
    .dot-row span:nth-child(4) { animation-delay: 1.2s; }
    .dot-row span:nth-child(5) { animation-delay: 1.6s; }

    @keyframes blink {
      0%, 100% { opacity: 0.2; transform: scale(0.85); }
      50%       { opacity: 0.9; transform: scale(1.2); }
    }

    /* ── Animations ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.6rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      color: #444;
      text-transform: uppercase;
      animation: fade-up 1s 0.9s ease both;
    }

    @media (max-width: 480px) {
      .logo-wrap { margin-bottom: 2rem; }
      .sub { margin-bottom: 2.2rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; }
    }
  </style>
</head>
<body>

  <!-- Animated background dots -->
  <div class="bg-dots" id="bgDots"></div>

  <main class="page">
    <div class="logo-wrap">
      <img src="IMG_0614.PNG" alt="AG Core Aeration logo" />
    </div>

    <div class="divider"></div>

    <h1>Coming Soon</h1>

    <p class="sub">Website Germinating</p>

    <div class="dot-row">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </main>

  <footer>AG Core Aeration &nbsp;·&nbsp; Website Launching Soon</footer>

  <script>
    // Generate random scattered background dots
    const container = document.getElementById('bgDots');
    const count = 60;
    for (let i = 0; i < count; i++) {
      const dot = document.createElement('span');
      dot.style.left   = Math.random() * 100 + '%';
      dot.style.top    = Math.random() * 100 + '%';
      dot.style.animationDelay    = (Math.random() * 4) + 's';
      dot.style.animationDuration = (3 + Math.random() * 3) + 's';
      dot.style.width  = (3 + Math.random() * 4) + 'px';
      dot.style.height = dot.style.width;
      container.appendChild(dot);
    }
  </script>
</body>
</html>
